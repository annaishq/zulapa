# Builds the static site, optionally mirrors MP3s from S3 into ./audio/, uploads the Pages artifact only (no git commit).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate IPA allowlist
        run: node scripts/generate-allowlist.mjs

      - name: Sync audio from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          S3_AUDIO_BUCKET: ${{ secrets.S3_AUDIO_BUCKET }}
        run: |
          mkdir -p audio
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] \
            || [ -z "${AWS_DEFAULT_REGION:-}" ] || [ -z "${S3_AUDIO_BUCKET:-}" ]; then
            echo "Skipping aws s3 sync (optional: set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, S3_AUDIO_BUCKET)."
            exit 0
          fi
          aws s3 sync "s3://${S3_AUDIO_BUCKET}/audio/" ./audio/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
